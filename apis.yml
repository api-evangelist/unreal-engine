aid: unreal-engine
name: Unreal Engine
description: >-
  Unreal Engine is Epic Games' real-time 3D engine for games, film,
  broadcast, architecture, simulation, automotive, and live events. The
  engine is shipped as a downloadable editor, source on GitHub (under the
  Unreal Engine EULA), and a deep C++ and Blueprint API surface rather than
  a public REST API. The developer-facing surface includes the Unreal C++
  API reference, the Blueprint visual scripting API, the Online Subsystem
  (OSS) abstraction over platform backends, the Pixel Streaming framework
  for streaming Unreal apps over WebRTC, the Render Hardware Interface
  (RHI), the Slate UI framework, and a plugin and Marketplace ecosystem
  (now Fab). Programmatic backend integration for Unreal-built games is
  typically delivered via Epic Online Services (EOS), profiled separately.
  This profile documents Unreal Engine as an SDK and tooling surface rather
  than as a REST API.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://www.unrealengine.com
